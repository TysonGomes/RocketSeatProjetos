<!DOCTYPE html>
<html lang="pt-br" class="">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./assets/favicon.svg" type="image/x-svg">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script type="module" src="src/main.js" defer></script>
    <title>Focus Timer 2.0</title>
</head>
<body>
    <div id="app">
        <button id="toggle-mode">
        <span class="sr-only">Ativar/Desativar Light Mode</span>
        <i class="ph-bold ph-sun"></i>
        <i class="ph-bold ph-moon"></i>
        </button>
        <div id="timercontrol">
        <section id="timer" class="flex">
            <span id="minutes">00</span>
            <span>:</span>
            <span id="seconds">00</span>
        </section>

        <section id="controls" class="flex">
            <button
            data-action="toggleRunning"
            class="ph ph-play-circle">
                <span class="sr-only">Iniciar contador</span>
            </button>

            <button 
            data-action="toggleRunning"
            class="ph ph-pause-circle">
                <span class="sr-only">Pausar contador</span>
            </button>
            
            <button 
            data-action="set"
            class="ph ph-timer secondary">
                <span class="sr-only">Ajustar contador</span>
            </button>

            <button 
            data-action="reset"
            class="ph ph-stop-circle secondary">
                <span class="sr-only">Reiniciar contador</span>
            </button>

            <button
            data-action="toggleMusic"
            class="ph ph-speaker-none secondary">
                <span class="sr-only">Inicar Música</span>
            </button>

            <button
            data-action="toggleMusic"
             class="ph ph-speaker-high">
                <span class="sr-only">Parar Música</span>
            </button>
            
        <button
        data-action="plusFive"
         class="ph ph-plus-circle">
            <span class="sr-only">Mais 5 minutos</span>
        </button>
        <button
        data-action="minusFive"
         class="ph ph-minus-circle">
            <span class="sr-only">Menos 5 minutos</span>
        </button>
    </section>


    </div>
        <div id="sounds">
        <section id="modes">
            <button
            data-action="florestMode"
            class="ph ph ph-leaf">
                <span class="sr-only">Modo Floresta</span>
            </button>
            
            
            <button
            data-action="rainMode"
            class="ph ph-cloud-snow">
                <span class="sr-only">Modo Chuva</span>
            </button>

            <button
            data-action="fireMode"
            class="ph ph-flame">
                <span class="sr-only">Modo Laleira</span>
            </button>
            
            
            <button
            data-action="coffeeMode"
            class="ph ph ph-coffee">
                <span class="sr-only">Modo Cafeteria</span>
            </button>
            

        </section>
        
    </div>
       
    </div>
</body>
</html>
