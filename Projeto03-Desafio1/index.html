<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Staatliches&display=swap" rel="stylesheet">
    <title>Crie Seu Evento</title>
</head>
<body>
    <div class="page">
        <header>
            <h1>MENTORIA</h1>
            
            <p>Preencha o formulário 
             abaixo para agendar a sua mentoria</p>

        </header>
         <form>
            <fieldset>
                <div class="fieldset-wrapper">
                <legend>Informações Pessoais</legend>
                    <div class="col-2">
                    
                    <div class="input-wrapper">
                        <label for="name">Nome</label>
                        <input type="text" id="name"/>
                    </div>
                    <div class="input-wrapper">
                        <label for="lastname">Sobrenome:</label>
                        <input type="text" id="lastName"/>
                    </div>
                 </div>   
                    <div class="input-wrapper">
                        <label for="email">Email<span> (digite um e-mail valido)</span></label>
                        <input type="email" id="email"/>
                    </div>
                    <div class="input-wrapper">
                        <label for="senha">Senha <span> (minimo 6 caracteres)</span></label>
                        <input type="password" id="senha"/>
                    </div>
                </div>  
            </fieldset>
         
            <fieldset>
                <div class="fieldset-wrapper">
                    <legend>Informações do Mentor</legend>
                        <div class="input-wrapper">
                            <label for="mentor-name">Nome do Mentor <span>(somente o primeiro nome)</span></label>
                            <input type="text" id="mentor-name"/>
                        </div>
                    </div>


            </fieldset>

            <fieldset>
                <div class="fieldset-wrapper">
                    <legend>Seus Horários Disponíveis</legend>
                        <h2>Primeira Mentoria</h2>
                            <div class="col-3">
                        
                                <div class="input-wrapper">
                                    <label for="event-date">Data<span>(dd/mm/aaaa)</span></label>
                                    <input type="date" id="event-date"/>
                                </div>

                                <div class="input-wrapper">
                                    <label for="event-begin">Das</label>
                                    <input type="time" id="event-begin"/>
                                </div>
                                <div class="input-wrapper">
                                    <label for="event-end">Até</label>
                                    <input type="time" id="event-end"/>
                        </div>
             </fieldset>
             <fieldset>           
                <div class="fieldset-wrapper">
                    <h2>Segunda Mentoria</h2>
                        <div class="col-3">
                        
                            <div class="input-wrapper">
                                <label for="event-date">Data<span>(dd/mm/aaaa)</span></label>
                                <input type="date" id="event-date"/>
                            </div>

                            <div class="input-wrapper">
                                <label for="event-begin">Das</label>
                                <input type="time" id="event-begin"/>
                            </div>
                            <div class="input-wrapper">
                                <label for="event-end">Até</label>
                                <input type="time" id="event-end"/>
                    </div>
                </div>    

            </fieldset>

         </form>
         <footer>
            <input class="button" type="submit" value="Salvar">
         </footer>


    </div>
</body>
</html>
