<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Roboto:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    
    <title>GitHuB</title>

    <script type="module" src="js/main.js" defer></script>
</head>
<body>
    <div id="app">
    <header>
        <h1>GitHub Fav</h1>
        <div class="search">
            <label  class="sr-only" for="input-seach">Usuario do GitHub</label>
            <input id="input-seach" type="text" placeholder="Git Hub User">
            <button>&plus; Favoritar</button>
        </div>
    </header>
    <table>
        <thead>
            <tr>
                <th>Usuario</th>
                <th>Repositorios</th>
                <th>Followers</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="user">
                    <img src="" alt="">
                    <a href="http://">
                    <p></p></a>
                    <span></span>
                </td>
                <td class="repositories"></td>
                <td class="followers"></td>
                <td> 
                <button class="remove">&times;</button> 

                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
